name: SEC Report Validation

on:
  workflow_dispatch:
    inputs:
      test_set:
        description: 'Which test sets to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - V30
          - US GAAP 2026
          - US GAAP 2025
          - US GAAP 2025 (2)
          - US GAAP 2025 (3)
          - US GAAP roll to 2025
          - US GAAP roll to 2025 (2)
          - US GAAP roll to 2025 (3)
          - US GAAP roll to 2025 (4)
          - US GAAP 2024
          - US GAAP 2024 (2)
          - US GAAP 2024 (3)
          - US GAAP 2023
          - IFRS 2025 & 2024
          - IFRS 2023
      xule_version:
        description: 'Xule plugin branch/tag'
        required: false
        default: '30050'
        type: string
      transform_version:
        description: 'EDGAR transform plugin branch/tag'
        required: false
        default: '25.1'
        type: string
      arelle_version:
        description: 'Arelle-release pip version'
        required: false
        default: '2.37.58'
        type: string

env:
  PYTHON_VERSION: '3.13'
  XULE_VERSION: ${{ inputs.xule_version }}
  XULE_REPO: xbrlus
  TRANSFORM_VERSION: ${{ inputs.transform_version }}

jobs:
  build-matrix:
    name: Build test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build matrix from test config
        id: set-matrix
        run: |
          SELECTED="${{ inputs.test_set }}"
          if [ "$SELECTED" = "all" ]; then
            MATRIX=$(python3 -c "
          import json
          with open('.github/workflows/sec-validation-tests.json') as f:
              tests = json.load(f)
          includes = []
          for i, t in enumerate(tests):
              if t.get('enabled', True):
                  includes.append({
                      'index': i,
                      'name': t['name'],
                  })
          if not includes:
              print('No enabled test sets found', file=sys.stderr)
              exit(1)
          print(json.dumps({'include': includes}))
          ")
          else
            MATRIX=$(python3 -c "
          import json, sys
          selected = sys.argv[1]
          with open('.github/workflows/sec-validation-tests.json') as f:
              tests = json.load(f)
          includes = []
          for i, t in enumerate(tests):
              if t['name'] == selected:
                  includes.append({
                      'index': i,
                      'name': t['name'],
                  })
          if not includes:
              print('No matching test set found', file=sys.stderr)
              sys.exit(1)
          print(json.dumps({'include': includes}))
          " "$SELECTED")
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  validate:
    name: "${{ matrix.name }}"
    needs: build-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install Arelle-release==${{ inputs.arelle_version }}

      - name: Set up Xule and EDGAR plugins
        run: |
          SITE_PACKAGES=$(python -c "import sysconfig; print(sysconfig.get_paths()['purelib'])")

          git clone --depth=1 --branch "$XULE_VERSION" --single-branch \
            "https://github.com/$XULE_REPO/xule.git" temp/xule
          mv temp/xule/plugin/xule "$SITE_PACKAGES/arelle/plugin/"
          mv temp/xule/plugin/semanticHash.py "$SITE_PACKAGES/arelle/plugin/"
          mv temp/xule/plugin/validate/DQC.py "$SITE_PACKAGES/arelle/plugin/validate/"
          rm -rf temp

          git clone --quiet --depth=1 --branch "$TRANSFORM_VERSION" --single-branch \
            "https://github.com/Arelle/EDGAR.git" EDGAR
          mv EDGAR "$SITE_PACKAGES/arelle/plugin/"

      - name: Configure ruleset map
        run: |
          GH_RAW="https://github.com/${{ github.repository }}/raw/${{ github.ref_name }}"
          sed -i "s|https://github.com/DataQualityCommittee/dqc_us_rules/.*/dqc_us_rules/|$GH_RAW/dqc_us_rules/|" rulesetMap.json
          sed -i "s|\?raw=true||" rulesetMap.json

      - name: Extract test set and write filing list
        id: testdata
        run: |
          python3 -c "
          import json
          with open('.github/workflows/sec-validation-tests.json') as f:
              tests = json.load(f)
          test = tests[${{ matrix.index }}]
          with open('infiles.json', 'w') as f:
              json.dump(test['infiles'], f)
          with open('exfiles.txt', 'w') as f:
              f.write(test['exfiles'])
          print('Filing list:')
          for filing in test['infiles']:
              print(f\"  {filing['xule_run_only']}: {filing['file']}\")
          "
          echo "exfiles=$(cat exfiles.txt)" >> "$GITHUB_OUTPUT"

      - name: Run Arelle DQC validation
        run: |
          python -m arelle.CntlrCmdLine \
            --httpUserAgent "DQC-Arelle (xbrl.us; dqc@xbrl.us)" \
            --plugin "validate/DQC|EDGAR/transform|inlineXbrlDocumentSet" \
            -v \
            --dqc-replace-rule-set-map ./rulesetMap.json \
            --xule-filing-list infiles.json \
            --logFile ./log.xml \
            --xule-debug

      - name: Compare results against expected
        id: compare
        run: |
          python compare.py \
            --compare-file ./report.txt \
            --test-files ./log.xml \
            --expected-results "${{ steps.testdata.outputs.exfiles }}" \
            --html-file ./report.html
        continue-on-error: true

      - name: Print log.xml
        if: always()
        run: head -3000 log.xml || true

      - name: Print comparison report (text)
        if: always()
        run: |
          echo "===== COMPARISON REPORT (TEXT) ====="
          cat report.txt 2>/dev/null || echo "No text report generated."
          echo "===== END COMPARISON REPORT ====="

      - name: Print comparison report (HTML)
        if: always()
        run: |
          echo "===== COMPARISON REPORT (HTML) ====="
          cat report.html 2>/dev/null || echo "No HTML report generated."
          echo "===== END COMPARISON REPORT ====="

      - name: Upload reports as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "reports-${{ matrix.name }}"
          path: |
            log.xml
            report.txt
            report.html
          retention-days: 30

      - name: Report outcome
        if: always()
        run: |
          if [ "${{ steps.compare.outcome }}" = "failure" ]; then
            echo "::error::Discrepancies found in ${{ matrix.name }}. See uploaded artifacts."
            exit 1
          else
            echo "All validation results match expected output for ${{ matrix.name }}."
          fi
